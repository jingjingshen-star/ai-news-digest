<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI 简报 · 历史存档</title>
<style>
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f0f4f8; padding: 32px 16px; }
  .container { max-width: 700px; margin: 0 auto; }
  h1 { color: #0D2137; font-size: 24px; margin-bottom: 8px; }
  p { color: #666; font-size: 14px; margin-bottom: 24px; }
  .back { display: inline-block; margin-bottom: 20px; color: #4A90D9; text-decoration: none; font-size: 14px; }
  .back:hover { text-decoration: underline; }
  .archive-list { list-style: none; }
  .archive-item {
    background: #fff; border-radius: 10px; padding: 16px 20px; margin-bottom: 10px;
    box-shadow: 0 2px 6px rgba(13,33,55,0.06); border-left: 4px solid #4A90D9;
  }
  .archive-item a { color: #0D2137; text-decoration: none; font-weight: 600; font-size: 15px; }
  .archive-item a:hover { color: #4A90D9; }
  .archive-meta { font-size: 12px; color: #888; margin-top: 4px; }
  .lang-en { display: none; }
  body.show-en .lang-cn { display: none; }
  body.show-en .lang-en { display: block; }
  .lang-toggle { display: flex; gap: 8px; margin: 20px 0; }
  .lang-btn { border: 1px solid #4A90D9; background: transparent; color: #4A90D9; padding: 5px 16px; border-radius: 20px; cursor: pointer; font-size: 13px; }
  .lang-btn.active { background: #4A90D9; color: #fff; }
</style>
</head>
<body>
<div class="container">
  <a class="back" href="index.html">← 返回今日简报 / Back to Today</a>
  <div class="lang-toggle">
    <button class="lang-btn active" onclick="setLang(false)">🇨🇳 中文</button>
    <button class="lang-btn" onclick="setLang(true)">🌐 English</button>
  </div>
  <h1 class="lang-cn">📜 历史简报存档</h1>
  <h1 class="lang-en" style="display:none">📜 News Digest Archive</h1>
  <p class="lang-cn">共 18 期简报，持续更新中</p>
  <p class="lang-en" style="display:none">18 issues archived</p>
  <ul class="archive-list" id="archive-list"></ul>
</div>
<script>
function setLang(en) {
  document.body.classList.toggle('show-en', en);
  document.querySelectorAll('.lang-btn')[0].classList.toggle('active', !en);
  document.querySelectorAll('.lang-btn')[1].classList.toggle('active', en);
}
fetch('archive/archive.json').then(r=>r.json()).then(data=>{
  const ul = document.getElementById('archive-list');
  data.forEach(item=>{
    const li = document.createElement('li');
    li.className='archive-item';
    li.innerHTML='<a href='+item.url+'>'+item.title_zh+'</a><div class="archive-meta"><span>'+item.date+'</span> · <span>'+item.title_en+'</span></div>';
    ul.appendChild(li);
  });
}).catch(()=>{});
</script>
</body>
</html>
